name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17 python3-pip \
          build-essential libffi-dev libssl-dev

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install cython buildozer kivy

    - name: Cache Buildozer (speeds up future builds)
      uses: actions/cache@v4
      with:
        path: |
          .buildozer
        key: buildozer-${{ runner.os }}

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendaryMVR-APK
        path: bin/*.apk
