name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17 python3-pip
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LegendaryMVR-apk
        path: bin/*.apk
