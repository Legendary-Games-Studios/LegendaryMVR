name: Build Android APK (Buildozer Stable)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip \
          build-essential libffi-dev libssl-dev default-jdk wget

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Install Buildozer (pinned version)
      run: |
        pip install cython
        pip install buildozer==1.4.0
        pip install kivy

    - name: Setup Android SDK (fix AIDL issue)
      run: |
        mkdir -p $HOME/android-sdk
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV

        mkdir -p $HOME/.buildozer/android/platform/android-sdk

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendaryMVR-APK
        path: bin/*.apk
