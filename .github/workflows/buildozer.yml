name: Build Android APK (Stable SDK Fix)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip \
          build-essential libffi-dev libssl-dev default-jdk wget

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython buildozer==1.4.0 kivy

    # -------------------------------
    # ANDROID SDK FIX (IMPORTANT PART)
    # -------------------------------
    - name: Install Android SDK (modern layout)
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME

        cd $HOME
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip cmdline.zip

        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Install Android packages (FIX AIDL + build tools)
      run: |
        sdkmanager "platform-tools" \
                   "platforms;android-33" \
                   "build-tools;33.0.2"

    # -------------------------------
    # BUILD APK
    # -------------------------------
    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendaryMVR-APK
        path: bin/*.apk
